name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with claude extra so SDK-gated tests run)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,claude]"
      - name: Run tests
        run: pytest -q
      - name: Build + metadata check
        run: |
          python -m build
          twine check dist/*
